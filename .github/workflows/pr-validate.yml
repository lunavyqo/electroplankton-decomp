name: PR match validation

# Byte-check every changed src/**/*.c|cpp against the ROM.
#
# Architecture (Pi + Mac):
#   - Raspberry Pi hosts the always-on Actions runner (label ep-validate).
#   - mwccarm cannot run on Pi ARM; Linux runners SSH to the Mac for match.
#   - Mac-local runners with the same label run match in-process.
#
# Pi SSH key: ~/.ssh/id_ed25519_ep_mac → Mac authorized_keys
# ROM + mwcc stay on the Mac only.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "src/**"
      - "tools/match.py"
      - "tools/pr_validate.py"
      - "config/**"
      - ".github/workflows/pr-validate.yml"

concurrency:
  group: pr-validate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: [self-hosted, ep-validate]
    timeout-minutes: 30
    env:
      EP_MAC_SSH: ${{ vars.EP_MAC_SSH || 'mrbebra@192.168.1.5' }}
      EP_MAC_REPO: ${{ vars.EP_MAC_REPO || '/Users/mrbebra/Documents/SGH/electroplankton decomp' }}
      EP_MAC_MWCC: ${{ vars.EP_MAC_MWCC || '/Users/mrbebra/Documents/SGH/SM64DS/tools/mwccarm' }}
      EP_MAC_BIN: ${{ vars.EP_MAC_BIN || '/Users/mrbebra/Documents/SGH/SM64DS/tools/bin' }}
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Validate matches
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail

          if [ "$(uname -s)" = "Darwin" ]; then
            echo "Local Mac runner — matching here"
            EXTRACT="${EP_EXTRACT_DIR:-$EP_MAC_REPO}"
            MWCC="${EP_MWCCARM_DIR:-$EP_MAC_MWCC}"
            BIN="${EP_BIN_DIR:-$EP_MAC_BIN}"
            mkdir -p arm9 arm7
            cp -f "$EXTRACT/arm9/arm9.bin" arm9/arm9.bin
            cp -f "$EXTRACT/arm7/arm7.bin" arm7/arm7.bin 2>/dev/null || true
            [ -e tools/mwccarm ] || ln -sfn "$MWCC" tools/mwccarm
            [ -e tools/bin ] || ln -sfn "$BIN" tools/bin
            python3 tools/pr_validate.py --base "$BASE" --version 1.2/sp2p3
            exit 0
          fi

          echo "Linux runner ($(uname -m)) — SSH match to $EP_MAC_SSH"
          SSH_KEY="${HOME}/.ssh/id_ed25519_ep_mac"
          export RSYNC_RSH="ssh -o BatchMode=yes -o ConnectTimeout=20 -o StrictHostKeyChecking=accept-new"
          if [ -f "$SSH_KEY" ]; then
            RSYNC_RSH="$RSYNC_RSH -i $SSH_KEY"
          fi
          ssh_mac() {
            # shellcheck disable=SC2086
            $RSYNC_RSH "$EP_MAC_SSH" "$@"
          }
          q() { printf '%q' "$1"; }

          ssh_mac "echo mac_ok; test -f $(q "$EP_MAC_REPO/arm9/arm9.bin"); test -d $(q "$EP_MAC_MWCC")"

          REMOTE_DIR="/tmp/ep-pr-validate-${RUN_ID}"
          ssh_mac "rm -rf $(q "$REMOTE_DIR") && mkdir -p $(q "$REMOTE_DIR")"

          rsync -az --delete ./ "${EP_MAC_SSH}:${REMOTE_DIR}/"

          # Remote script avoids env(1) + space-in-path bugs
          ssh_mac "cat > $(q "$REMOTE_DIR/run_validate.sh")" <<EOF
          #!/bin/bash
          set -euo pipefail
          cd $(q "$REMOTE_DIR")
          mkdir -p arm9 arm7
          cp -f $(q "$EP_MAC_REPO/arm9/arm9.bin") arm9/arm9.bin
          cp -f $(q "$EP_MAC_REPO/arm7/arm7.bin") arm7/arm7.bin 2>/dev/null || true
          rm -f tools/mwccarm tools/bin
          ln -sfn $(q "$EP_MAC_MWCC") tools/mwccarm
          ln -sfn $(q "$EP_MAC_BIN") tools/bin
          python3 tools/pr_validate.py --base $(q "$BASE") --version 1.2/sp2p3
          rm -rf $(q "$REMOTE_DIR")
          EOF
          ssh_mac "bash $(q "$REMOTE_DIR/run_validate.sh")"
