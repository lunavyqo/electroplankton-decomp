name: PR match validation

# Byte-check every changed src/**/*.c|cpp against the ROM.
#
# Architecture (Pi + Mac):
#   - Raspberry Pi runs the self-hosted Actions runner 24/7 (label ep-validate,pi).
#   - mwccarm is a Windows x86 PE — does not run on Pi ARM (qemu nested PE fails).
#   - Linux runners SSH to the Mac mini and run match there (wibo + mwcc native).
#   - A Mac-local runner with the same label also works (runs match locally).
#
# Pi → Mac SSH uses key ~/.ssh/id_ed25519_ep_mac on the Pi.
# Mac must have Remote Login on and that pubkey in ~/.ssh/authorized_keys.
# ROM + mwcc live only on the Mac (never committed).

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "src/**"
      - "tools/match.py"
      - "tools/pr_validate.py"
      - "config/**"
      - ".github/workflows/pr-validate.yml"

concurrency:
  group: pr-validate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: [self-hosted, ep-validate]
    timeout-minutes: 30
    env:
      EP_MAC_SSH: ${{ vars.EP_MAC_SSH || 'mrbebra@192.168.1.5' }}
      EP_MAC_REPO: ${{ vars.EP_MAC_REPO || '/Users/mrbebra/Documents/SGH/electroplankton decomp' }}
      EP_MAC_MWCC: ${{ vars.EP_MAC_MWCC || '/Users/mrbebra/Documents/SGH/SM64DS/tools/mwccarm' }}
      EP_MAC_BIN: ${{ vars.EP_MAC_BIN || '/Users/mrbebra/Documents/SGH/SM64DS/tools/bin' }}
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Validate matches
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail

          if [ "$(uname -s)" = "Darwin" ]; then
            echo "Local Mac runner — matching here"
            EXTRACT="${EP_EXTRACT_DIR:-$EP_MAC_REPO}"
            MWCC="${EP_MWCCARM_DIR:-$EP_MAC_MWCC}"
            BIN="${EP_BIN_DIR:-$EP_MAC_BIN}"
            mkdir -p arm9 arm7
            cp -f "$EXTRACT/arm9/arm9.bin" arm9/arm9.bin
            cp -f "$EXTRACT/arm7/arm7.bin" arm7/arm7.bin 2>/dev/null || true
            [ -e tools/mwccarm ] || ln -sfn "$MWCC" tools/mwccarm
            [ -e tools/bin ] || ln -sfn "$BIN" tools/bin
            python3 tools/pr_validate.py --base "$BASE" --version 1.2/sp2p3
            exit 0
          fi

          echo "Linux runner ($(uname -m)) — SSH match to $EP_MAC_SSH"
          SSH_KEY="${HOME}/.ssh/id_ed25519_ep_mac"
          RSH=(ssh -o BatchMode=yes -o ConnectTimeout=20 -o StrictHostKeyChecking=accept-new)
          if [ -f "$SSH_KEY" ]; then
            RSH+=(-i "$SSH_KEY")
          fi

          # Prove Mac is reachable before rsync
          "${RSH[@]}" "$EP_MAC_SSH" "echo mac_ok; test -f \"$EP_MAC_REPO/arm9/arm9.bin\"; test -d \"$EP_MAC_MWCC\""

          REMOTE_DIR="/tmp/ep-pr-validate-${RUN_ID}"
          "${RSH[@]}" "$EP_MAC_SSH" "rm -rf '$REMOTE_DIR' && mkdir -p '$REMOTE_DIR'"

          # Prefer rsync; fall back to tar-over-ssh
          if command -v rsync >/dev/null; then
            rsync -az --delete \
              -e "${RSH[*]}" \
              ./ "${EP_MAC_SSH}:${REMOTE_DIR}/"
          else
            tar czf - . | "${RSH[@]}" "$EP_MAC_SSH" "mkdir -p '$REMOTE_DIR' && tar xzf - -C '$REMOTE_DIR'"
          fi

          "${RSH[@]}" "$EP_MAC_SSH" \
            env REMOTE_DIR="$REMOTE_DIR" BASE="$BASE" \
                EP_MAC_REPO="$EP_MAC_REPO" EP_MAC_MWCC="$EP_MAC_MWCC" EP_MAC_BIN="$EP_MAC_BIN" \
            bash -s <<'REMOTE'
          set -euo pipefail
          cd "$REMOTE_DIR"
          mkdir -p arm9 arm7
          cp -f "$EP_MAC_REPO/arm9/arm9.bin" arm9/arm9.bin
          cp -f "$EP_MAC_REPO/arm7/arm7.bin" arm7/arm7.bin 2>/dev/null || true
          rm -f tools/mwccarm tools/bin
          ln -sfn "$EP_MAC_MWCC" tools/mwccarm
          ln -sfn "$EP_MAC_BIN" tools/bin
          python3 tools/pr_validate.py --base "$BASE" --version 1.2/sp2p3
          rm -rf "$REMOTE_DIR"
          REMOTE

      - name: Comment summary on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- ep-pr-validate -->';
            const body = `${marker}
            ### ❌ PR match validation failed

            Changed \`src/**/*.c|cpp\` did not reproduce the ROM with mwccarm \`1.2/sp2p3\`.

            Local check:
            \`\`\`bash
            python tools/pr_validate.py --base origin/main
            \`\`\`
            `;
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
