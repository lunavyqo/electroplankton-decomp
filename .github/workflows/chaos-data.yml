name: Publish Chaos Viewer data

on:
  push:
    branches: [main]
    paths:
      - "config/**"
      - "src/**"
      - "tools/chaos_db_ci.py"
      - "tools/chaosviewer.config.json"
      - ".github/workflows/chaos-data.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate chaos-db.json
        run: python tools/chaos_db_ci.py --out /tmp/chaos-db.json

      - name: Publish to chaos-data branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          WORK=$(mktemp -d)
          cp /tmp/chaos-db.json "$WORK/chaos-db.json"
          cp /tmp/contributions.json "$WORK/contributions.json"
          git fetch origin chaos-data 2>/dev/null || true
          if git rev-parse --verify origin/chaos-data >/dev/null 2>&1; then
            git archive origin/chaos-data details 2>/dev/null | tar -x -C "$WORK" 2>/dev/null || true
          fi
          cat > "$WORK/README.md" <<'EOF'
          # chaos-data

          Published atlas for [Chaos Viewer](https://tangosdev.github.io/chaos-viewer/).

          Generated by `tools/chaos_db_ci.py` from committed symbols + `src/`.
          Contains function metadata and optional annotated disassembly text only —
          no ROM, binaries, or game assets.
          EOF
          python3 -c "
          from pathlib import Path
          p = Path('$WORK') / 'README.md'
          p.write_text('\n'.join(l.lstrip() for l in p.read_text().splitlines()) + '\n')
          "
          cd "$WORK"
          git init -b chaos-data
          git add chaos-db.json contributions.json README.md
          if [ -d details ]; then git add details; fi
          git -c user.name="github-actions[bot]" \
              -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
              commit -m "Update Chaos Viewer atlas data"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push -f origin chaos-data
